<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 600" role="img"
     aria-labelledby="chart-anatomy-title chart-anatomy-desc"
     font-family="Arial, Helvetica, sans-serif">
  <title id="chart-anatomy-title">Anatomy of an NCDPI chart</title>
  <desc id="chart-anatomy-desc">An annotated horizontal bar chart of 4-year cohort graduation rates for North Carolina's eight SBE regions in 2025, with labeled callouts pointing to each visual element: title, subtitle, axis label, axis values, gridlines, data marks, data-mark label, annotation, and source note. The Northeast region is highlighted navy to draw attention; the other regions are neutral grey.</desc>

  <!-- Background -->
  <rect width="1240" height="600" fill="#FFFFFF"/>

  <!-- ============= The chart ============= -->
  <!-- Title — message-driven (the takeaway), per Convention 2 -->
  <text x="180" y="50" fill="#000000" font-size="22" font-weight="700">The Northeast region graduates 87% of its cohort</text>
  <!-- Subtitle — the contract: measure, metric type, unit of analysis, time period -->
  <text x="180" y="80" fill="#525A60" font-size="16">4-year cohort graduation rate (%), by SBE region, 2025</text>

  <!-- Gridlines (light grey, vertical) — value axis WITH gridlines, so the value-axis
       spine is dropped (Convention 10); only the zero baseline is drawn (below). -->
  <g stroke="#DEDEDE" stroke-width="1">
    <line x1="437.5" y1="110" x2="437.5" y2="510"/>
    <line x1="575"   y1="110" x2="575"   y2="510"/>
    <line x1="712.5" y1="110" x2="712.5" y2="510"/>
    <line x1="850"   y1="110" x2="850"   y2="510"/>
  </g>

  <!-- Zero baseline (Convention 6): the line bars grow from is the perceptual anchor
       for length, so it earns weight — darker (#525A60) than the gridlines. The
       category axis gets NO spine (Convention 10). -->
  <line x1="300" y1="110" x2="300" y2="510" stroke="#525A60" stroke-width="1.5"/>

  <!-- Category labels — left-justified to the content margin (Convention 3) -->
  <g fill="#000000" font-size="16" text-anchor="start">
    <text x="180" y="142">Western</text>
    <text x="180" y="192">Northwest</text>
    <text x="180" y="242">Piedmont Triad</text>
    <text x="180" y="292">North Central</text>
    <text x="180" y="342">Northeast</text>
    <text x="180" y="392">Southwest</text>
    <text x="180" y="442">Southeast</text>
    <text x="180" y="492">Sandhills</text>
  </g>

  <!-- Bars (scale: 0..100 -> 300..850, so width = pct x 5.5).
       Neutral #B7B9BB context + one navy #003A70 highlight (Northeast). Navy marks
       attention, NOT good/bad — a non-valenced highlight. -->
  <g>
    <rect x="300" y="122" width="504" height="30" fill="#B7B9BB"/>
    <rect x="300" y="172" width="490" height="30" fill="#B7B9BB"/>
    <rect x="300" y="222" width="489" height="30" fill="#B7B9BB"/>
    <rect x="300" y="272" width="485" height="30" fill="#B7B9BB"/>
    <rect x="300" y="322" width="480" height="30" fill="#003A70"/>
    <rect x="300" y="372" width="478" height="30" fill="#B7B9BB"/>
    <rect x="300" y="422" width="478" height="30" fill="#B7B9BB"/>
    <rect x="300" y="472" width="474" height="30" fill="#B7B9BB"/>
  </g>

  <!-- Bar value labels (direct, so they double as the data-mark label) -->
  <g fill="#000000" font-size="16">
    <text x="812" y="142">91.6</text>
    <text x="798" y="192">89.1</text>
    <text x="797" y="242">88.9</text>
    <text x="793" y="292">88.2</text>
    <text x="788" y="342" font-weight="700">87.3</text>
    <text x="786" y="392">86.9</text>
    <text x="786" y="442">86.9</text>
    <text x="782" y="492">86.1</text>
  </g>

  <!-- Inline annotation (Plum, italic) on the highlighted bar -->
  <text x="845" y="342" fill="#842175" font-size="15" font-style="italic">5th of 8</text>

  <!-- X-axis tick values (value axis: numbers kept, ticks + spine dropped) -->
  <g fill="#525A60" font-size="15" text-anchor="middle">
    <text x="300"   y="538">0</text>
    <text x="437.5" y="538">25</text>
    <text x="575"   y="538">50</text>
    <text x="712.5" y="538">75</text>
    <text x="850"   y="538">100</text>
  </g>

  <!-- Source note -->
  <text x="180" y="572" fill="#525A60" font-size="15">Source: NCDPI accountability data (4-year cohort graduation rate), 2025.</text>

  <!-- ============= Callouts ============= -->
  <!-- Leaders are routed to the chart's clean right/bottom edge so they never cross
       bars, labels, or gridlines on their way to the right-hand callout column. -->
  <g stroke="#525A60" stroke-width="1" stroke-dasharray="2 3" fill="none">
    <!-- Title (dot sits just past the title text) -->
    <line x1="810" y1="46" x2="950" y2="46"/>
    <!-- Subtitle (dot just past the subtitle text; stays above the plot) -->
    <line x1="620" y1="76" x2="950" y2="110"/>
    <!-- Data-mark label (Western's value, to the right of the bars) -->
    <line x1="852" y1="138" x2="950" y2="196"/>
    <!-- Gridlines (the right-most gridline, clear of every bar) -->
    <line x1="850" y1="356" x2="945" y2="352"/>
    <!-- Axis values (the "100" tick at the right edge) -->
    <line x1="850" y1="538" x2="950" y2="426"/>
    <!-- Source note (dropped low so its leader clears the Axis-values leader) -->
    <line x1="720" y1="568" x2="950" y2="556"/>
  </g>
  <!-- Annotation leader (plum) -->
  <g stroke="#842175" stroke-width="1" stroke-dasharray="2 3" fill="none">
    <line x1="905" y1="338" x2="950" y2="264"/>
  </g>
  <!-- Left-side leaders: axis label (-> first category label) and axis line
       (-> the dark zero baseline, through a white gap between rows). -->
  <g stroke="#525A60" stroke-width="1" stroke-dasharray="2 3" fill="none">
    <line x1="178" y1="138" x2="110" y2="78"/>
    <line x1="300" y1="307" x2="168" y2="307"/>
  </g>

  <!-- Dots at chart-side leader endpoints -->
  <g fill="#525A60">
    <circle cx="810" cy="46"  r="3.5"/>
    <circle cx="620" cy="76"  r="3.5"/>
    <circle cx="852" cy="138" r="3.5"/>
    <circle cx="850" cy="356" r="3.5"/>
    <circle cx="850" cy="538" r="3.5"/>
    <circle cx="720" cy="568" r="3.5"/>
    <circle cx="178" cy="138" r="3.5"/>
    <circle cx="300" cy="307" r="3.5"/>
  </g>
  <circle cx="905" cy="338" r="3.5" fill="#842175"/>

  <!-- Callout labels (right side, left-aligned at x=960) -->
  <g font-size="15">
    <text x="960" y="50"  fill="#003A70" font-weight="700">Title</text>
    <text x="960" y="68"  fill="#525A60">The takeaway — the one message</text>
    <text x="960" y="86"  fill="#525A60">Arial 14 pt, #000000</text>

    <text x="960" y="114" fill="#003A70" font-weight="700">Subtitle</text>
    <text x="960" y="132" fill="#525A60">The contract: measure, metric,</text>
    <text x="960" y="150" fill="#525A60">unit of analysis, time period</text>
    <text x="960" y="168" fill="#525A60">Arial 11 pt, #525A60</text>

    <text x="960" y="200" fill="#003A70" font-weight="700">Data-mark label</text>
    <text x="960" y="218" fill="#525A60">Arial 11 pt, #000000</text>

    <text x="960" y="268" fill="#842175" font-weight="700">Annotation</text>
    <text x="960" y="286" fill="#525A60">Plum #842175 — same color as</text>
    <text x="960" y="304" fill="#525A60">help text on dashboards</text>

    <text x="960" y="350" fill="#003A70" font-weight="700">Gridlines</text>
    <text x="960" y="368" fill="#525A60">Light grey #DEDEDE</text>

    <text x="960" y="412" fill="#003A70" font-weight="700">Axis values</text>
    <text x="960" y="430" fill="#525A60">Arial 11 pt, #525A60</text>

    <text x="960" y="556" fill="#003A70" font-weight="700">Source note</text>
    <text x="960" y="574" fill="#525A60">Arial 11 pt, #525A60</text>
  </g>
  <!-- Left-side callouts (left-aligned). Axis label = category labels; Axis line =
       the dark zero baseline / ruler color, darker than the gridlines (Convention 6). -->
  <g font-size="15">
    <text x="15" y="50"  fill="#003A70" font-weight="700">Axis label</text>
    <text x="15" y="68"  fill="#525A60">Arial 11 pt, #000000</text>

    <text x="15" y="300" fill="#003A70" font-weight="700">Axis line</text>
    <text x="15" y="318" fill="#525A60">Dark grey #525A60</text>
  </g>
</svg>
