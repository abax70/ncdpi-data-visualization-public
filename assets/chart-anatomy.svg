<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 500" role="img"
     aria-labelledby="chart-anatomy-title chart-anatomy-desc"
     font-family="Arial, Helvetica, sans-serif">
  <title id="chart-anatomy-title">Anatomy of an NCDPI chart</title>
  <desc id="chart-anatomy-desc">An annotated horizontal bar chart of average daily attendance by region with labeled callouts pointing to each visual element: title, subtitle, axis label, axis values, gridlines, data marks, data mark label, annotation, and source note.</desc>

  <!-- Background -->
  <rect width="1120" height="500" fill="#FFFFFF"/>

  <!-- ============= The chart ============= -->
  <!-- Title — message-driven (the takeaway), per Convention 2 -->
  <text x="180" y="52" fill="#000000" font-size="18" font-weight="700">Charlotte leads the state in attendance</text>
  <!-- Subtitle — the contract: measure, metric type, unit of analysis, time period -->
  <text x="180" y="76" fill="#525A60" font-size="13">Average daily attendance (%), by region, 2023–24</text>

  <!-- Gridlines (light grey, vertical) — the zero baseline is pulled out below so it reads darker -->
  <g stroke="#DEDEDE" stroke-width="1">
    <line x1="415" y1="110" x2="415" y2="350"/>
    <line x1="550" y1="110" x2="550" y2="350"/>
    <line x1="685" y1="110" x2="685" y2="350"/>
    <line x1="820" y1="110" x2="820" y2="350"/>
  </g>

  <!-- Axis lines, darker than gridlines (#525A60): the vertical ZERO BASELINE bars grow
       from is the perceptual anchor for length, so it earns weight; plus the value-axis spine. -->
  <line x1="280" y1="110" x2="280" y2="350" stroke="#525A60" stroke-width="1"/>
  <line x1="280" y1="350" x2="820" y2="350" stroke="#525A60" stroke-width="1"/>

  <!-- Category labels — left-justified to the content margin (Convention 3) -->
  <g fill="#000000" font-size="13" text-anchor="start">
    <text x="180" y="153">Mountain</text>
    <text x="180" y="197">Piedmont-Triad</text>
    <text x="180" y="241">Charlotte</text>
    <text x="180" y="285">Sandhills</text>
    <text x="180" y="329">Coastal Plain</text>
  </g>

  <!-- Bars (scale: 0..100 → 280..820, so width = pct × 5.4).
       Neutral #B7B9BB context + one navy #003A70 highlight (Charlotte), per color-highlights. -->
  <rect x="280" y="135" width="497" height="26" fill="#B7B9BB"/>
  <rect x="280" y="179" width="481" height="26" fill="#B7B9BB"/>
  <rect x="280" y="223" width="513" height="26" fill="#003A70"/>
  <rect x="280" y="267" width="464" height="26" fill="#B7B9BB"/>
  <rect x="280" y="311" width="475" height="26" fill="#B7B9BB"/>

  <!-- Bar value labels -->
  <g fill="#000000" font-size="13">
    <text x="785" y="155">92</text>
    <text x="769" y="199">89</text>
    <text x="801" y="243" font-weight="700">95</text>
    <text x="752" y="287">86</text>
    <text x="763" y="331">88</text>
  </g>

  <!-- X-axis tick values -->
  <g fill="#525A60" font-size="12" text-anchor="middle">
    <text x="280" y="372">0</text>
    <text x="415" y="372">25</text>
    <text x="550" y="372">50</text>
    <text x="685" y="372">75</text>
    <text x="820" y="372">100</text>
  </g>

  <!-- Inline annotation (Plum, italic) -->
  <text x="820" y="242" fill="#842175" font-size="12" font-style="italic">Highest in state</text>

  <!-- Source note -->
  <text x="180" y="412" fill="#525A60" font-size="12">Source: NCDPI school attendance data, 2023–24. Regions defined by the State Board of Education.</text>

  <!-- ============= Callouts ============= -->
  <!-- Dotted leader + dot at target; right-side callout label. -->
  <g stroke="#525A60" stroke-width="1" stroke-dasharray="2 3" fill="none">
    <!-- Title (dot sits just past the longer message-driven title) -->
    <line x1="585" y1="48" x2="900" y2="48"/>
    <!-- Subtitle (dot sits just past the contract subtitle) -->
    <line x1="585" y1="74" x2="900" y2="80"/>
    <!-- Annotation -->
    <line x1="800" y1="245" x2="950" y2="208"/>
    <!-- Data mark label -->
    <line x1="795" y1="155" x2="955" y2="155"/>
    <!-- Gridlines -->
    <line x1="685" y1="320" x2="900" y2="352"/>
    <!-- Axis values -->
    <line x1="550" y1="372" x2="900" y2="396"/>
    <!-- Source note -->
    <line x1="500" y1="412" x2="900" y2="442"/>
  </g>
  <g stroke="#525A60" stroke-width="1" stroke-dasharray="2 3" fill="none">
    <!-- Axis label (left side) — points at the start of the left-justified labels -->
    <line x1="180" y1="195" x2="135" y2="170"/>
  </g>

  <!-- Dots at leader endpoints -->
  <g fill="#525A60">
    <circle cx="585" cy="48" r="3"/>
    <circle cx="585" cy="74" r="3"/>
    <circle cx="795" cy="155" r="3"/>
    <circle cx="685" cy="320" r="3"/>
    <circle cx="550" cy="372" r="3"/>
    <circle cx="500" cy="412" r="3"/>
    <circle cx="180" cy="195" r="3"/>
  </g>
  <circle cx="800" cy="245" r="3" fill="#842175"/>

  <!-- Callout labels (right side, left-aligned at x=910) -->
  <g font-size="11">
    <text x="910" y="44"  fill="#003A70" font-weight="700">Title</text>
    <text x="910" y="58"  fill="#525A60">The takeaway — the one message</text>

    <text x="910" y="80"  fill="#003A70" font-weight="700">Subtitle</text>
    <text x="910" y="94"  fill="#525A60">The contract: measure, metric,</text>
    <text x="910" y="108" fill="#525A60">unit of analysis, time period</text>

    <text x="960" y="208" fill="#842175" font-weight="700">Annotation</text>
    <text x="960" y="222" fill="#525A60">Plum #842175 — same color as</text>
    <text x="960" y="236" fill="#525A60">help text on dashboards</text>

    <text x="965" y="151" fill="#003A70" font-weight="700">Data-mark label</text>
    <text x="965" y="165" fill="#525A60">Arial 11 pt, #000000</text>

    <text x="910" y="352" fill="#003A70" font-weight="700">Gridlines</text>
    <text x="910" y="366" fill="#525A60">Light grey #DEDEDE</text>

    <text x="910" y="396" fill="#003A70" font-weight="700">Axis values</text>
    <text x="910" y="410" fill="#525A60">Arial 11 pt, #525A60</text>

    <text x="910" y="442" fill="#003A70" font-weight="700">Source note</text>
    <text x="910" y="456" fill="#525A60">Arial 11 pt, #525A60</text>
  </g>
  <!-- Left-side callouts (right-aligned at x=50) -->
  <g font-size="11" text-anchor="end">
    <text x="130" y="158" fill="#003A70" font-weight="700">Axis label</text>
    <text x="130" y="172" fill="#525A60">Arial 11 pt, #000000</text>
  </g>
</svg>
