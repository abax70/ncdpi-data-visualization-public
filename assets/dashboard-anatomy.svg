<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img"
     aria-labelledby="dash-anatomy-title dash-anatomy-desc"
     font-family="Arial, Helvetica, sans-serif">
  <title id="dash-anatomy-title">Anatomy of an NCDPI dashboard</title>
  <desc id="dash-anatomy-desc">Annotated dashboard layout showing the NCDPI logo and title bar at the top, a row of three Big Aggregate Numbers, two supporting charts (a horizontal bar chart and a line chart), a filter rail on the right with two visible filters and a "More filters" toggle, a Plum help-text instruction, and a footer with the data-last-updated date, a contact address, and a glossary link.</desc>

  <!-- Background -->
  <rect width="1200" height="720" fill="#FFFFFF"/>

  <!-- ============= Dashboard frame ============= -->
  <rect x="20" y="20" width="920" height="660" fill="#FFFFFF" stroke="#DEDEDE" stroke-width="1"/>

  <!-- Header band (subtle) -->
  <rect x="20" y="20" width="920" height="80" fill="#F8FAFD"/>
  <line x1="20" y1="100" x2="940" y2="100" stroke="#DEDEDE" stroke-width="1"/>

  <!-- Logo placeholder (small) -->
  <rect x="40" y="36" width="58" height="46" fill="#003A70"/>
  <text x="69" y="64" fill="#FFFFFF" font-size="11" font-weight="700" text-anchor="middle">NCDPI</text>

  <!-- Dashboard title + subtitle -->
  <text x="120" y="55" fill="#003A70" font-size="22" font-weight="700">School Attendance Dashboard</text>
  <text x="120" y="78" fill="#525A60" font-size="13">Statewide and regional, 2023–24</text>

  <!-- ============= BAN row ============= -->
  <!-- BAN 1 -->
  <text x="60"  y="160" fill="#003A70" font-size="44" font-weight="700">92%</text>
  <text x="60"  y="180" fill="#525A60" font-size="12">Statewide attendance</text>
  <text x="60"  y="196" fill="#3D803F" font-size="11">▲ 1.2 pts vs. 2022</text>
  <!-- BAN 2 -->
  <text x="270" y="160" fill="#003A70" font-size="44" font-weight="700">$11.4k</text>
  <text x="270" y="180" fill="#525A60" font-size="12">Per-pupil spending</text>
  <text x="270" y="196" fill="#525A60" font-size="11">FY 2023</text>
  <!-- BAN 3 -->
  <text x="500" y="160" fill="#003A70" font-size="44" font-weight="700">1.5M</text>
  <text x="500" y="180" fill="#525A60" font-size="12">Students enrolled</text>
  <text x="500" y="196" fill="#525A60" font-size="11">K–12, fall 2023</text>

  <!-- Divider -->
  <line x1="40" y1="220" x2="920" y2="220" stroke="#DEDEDE" stroke-width="1"/>

  <!-- ============= Chart 1: horizontal bar chart ============= -->
  <text x="50" y="248" fill="#000000" font-size="13" font-weight="700">Attendance by region</text>
  <text x="50" y="265" fill="#525A60" font-size="11">Percent of students, 2023–24</text>
  <!-- gridlines -->
  <g stroke="#DEDEDE" stroke-width="1">
    <line x1="160" y1="280" x2="160" y2="440"/>
    <line x1="240" y1="280" x2="240" y2="440"/>
    <line x1="320" y1="280" x2="320" y2="440"/>
    <line x1="400" y1="280" x2="400" y2="440"/>
  </g>
  <!-- categories -->
  <g fill="#000000" font-size="11" text-anchor="end">
    <text x="155" y="298">Mountain</text>
    <text x="155" y="326">Piedmont</text>
    <text x="155" y="354">Charlotte</text>
    <text x="155" y="382">Sandhills</text>
    <text x="155" y="410">Coastal</text>
  </g>
  <!-- bars (160 = 0, 400 = 100) -->
  <rect x="160" y="288" width="221" height="16" fill="#003A70"/>
  <rect x="160" y="316" width="214" height="16" fill="#003A70"/>
  <rect x="160" y="344" width="228" height="16" fill="#003A70"/>
  <rect x="160" y="372" width="207" height="16" fill="#003A70"/>
  <rect x="160" y="400" width="211" height="16" fill="#003A70"/>
  <!-- x-axis -->
  <line x1="160" y1="440" x2="400" y2="440" stroke="#525A60" stroke-width="1"/>
  <g fill="#525A60" font-size="10" text-anchor="middle">
    <text x="160" y="455">0</text>
    <text x="240" y="455">50</text>
    <text x="320" y="455">75</text>
    <text x="400" y="455">100</text>
  </g>
  <!-- help text (Plum) -->
  <text x="50" y="478" fill="#842175" font-size="11" font-style="italic">Click a region to filter the charts.</text>

  <!-- ============= Chart 2: line chart ============= -->
  <text x="450" y="248" fill="#000000" font-size="13" font-weight="700">Statewide attendance trend</text>
  <text x="450" y="265" fill="#525A60" font-size="11">School year</text>
  <!-- gridlines -->
  <g stroke="#DEDEDE" stroke-width="1">
    <line x1="450" y1="290" x2="730" y2="290"/>
    <line x1="450" y1="340" x2="730" y2="340"/>
    <line x1="450" y1="390" x2="730" y2="390"/>
  </g>
  <!-- line -->
  <polyline points="460,360 510,372 560,388 610,348 660,330 720,316"
            fill="none" stroke="#003A70" stroke-width="2.5"/>
  <!-- dots -->
  <g fill="#003A70">
    <circle cx="460" cy="360" r="3"/>
    <circle cx="510" cy="372" r="3"/>
    <circle cx="560" cy="388" r="3"/>
    <circle cx="610" cy="348" r="3"/>
    <circle cx="660" cy="330" r="3"/>
    <circle cx="720" cy="316" r="3"/>
  </g>
  <!-- x-axis -->
  <line x1="450" y1="440" x2="730" y2="440" stroke="#525A60" stroke-width="1"/>
  <g fill="#525A60" font-size="10" text-anchor="middle">
    <text x="460" y="455">'18</text>
    <text x="510" y="455">'19</text>
    <text x="560" y="455">'20</text>
    <text x="610" y="455">'21</text>
    <text x="660" y="455">'22</text>
    <text x="720" y="455">'23</text>
  </g>

  <!-- ============= Filter rail (right) ============= -->
  <rect x="770" y="125" width="155" height="335" fill="#F8FAFD" stroke="#DEDEDE" stroke-width="1"/>
  <text x="785" y="148" fill="#003A70" font-size="12" font-weight="700">Filters</text>

  <!-- Filter 1 (Year) -->
  <text x="785" y="178" fill="#525A60" font-size="11">School year</text>
  <rect x="785" y="184" width="125" height="24" fill="#FFFFFF" stroke="#DEDEDE" stroke-width="1"/>
  <text x="794" y="201" fill="#000000" font-size="11">2023–24</text>
  <polyline points="895,194 901,200 907,194" fill="none" stroke="#525A60" stroke-width="1"/>

  <!-- Filter 2 (Region) -->
  <text x="785" y="232" fill="#525A60" font-size="11">Region</text>
  <rect x="785" y="238" width="125" height="24" fill="#FFFFFF" stroke="#DEDEDE" stroke-width="1"/>
  <text x="794" y="255" fill="#000000" font-size="11">All regions</text>
  <polyline points="895,248 901,254 907,248" fill="none" stroke="#525A60" stroke-width="1"/>

  <!-- More filters toggle (collapsed) -->
  <line x1="785" y1="290" x2="910" y2="290" stroke="#DEDEDE" stroke-width="1"/>
  <text x="785" y="312" fill="#006174" font-size="11" font-weight="700">▸ More filters (4)</text>

  <!-- Footer area -->
  <line x1="40" y1="600" x2="920" y2="600" stroke="#DEDEDE" stroke-width="1"/>
  <text x="50"  y="625" fill="#525A60" font-size="11">Data updated 2025-09-15 · Refreshed monthly</text>
  <text x="50"  y="645" fill="#525A60" font-size="11">Questions: research@dpi.nc.gov</text>
  <text x="50"  y="665" fill="#006174" font-size="11" font-weight="700">View glossary →</text>
  <!-- Footer logo -->
  <rect x="870" y="618" width="50" height="40" fill="#003A70"/>
  <text x="895" y="643" fill="#FFFFFF" font-size="10" font-weight="700" text-anchor="middle">NCDPI</text>

  <!-- ============= Callouts ============= -->
  <g stroke="#525A60" stroke-width="1" stroke-dasharray="2 3" fill="none">
    <!-- Title bar -->
    <line x1="400" y1="55" x2="975" y2="40"/>
    <!-- NCDPI logo top -->
    <line x1="100" y1="58" x2="975" y2="80"/>
    <!-- BAN row -->
    <line x1="600" y1="160" x2="975" y2="160"/>
    <!-- Filter rail -->
    <line x1="925" y1="200" x2="975" y2="218"/>
    <!-- Charts (Z-pattern) -->
    <line x1="380" y1="370" x2="975" y2="350"/>
    <!-- Help text (Plum) -->
    <line x1="200" y1="475" x2="975" y2="455"/>
    <!-- Footer chrome -->
    <line x1="500" y1="640" x2="975" y2="620"/>
  </g>

  <!-- Endpoint dots -->
  <g fill="#525A60">
    <circle cx="400" cy="55"  r="3"/>
    <circle cx="100" cy="58"  r="3"/>
    <circle cx="600" cy="160" r="3"/>
    <circle cx="925" cy="200" r="3"/>
    <circle cx="380" cy="370" r="3"/>
    <circle cx="500" cy="640" r="3"/>
  </g>
  <circle cx="200" cy="475" r="3" fill="#842175"/>

  <!-- Callout labels (right side) -->
  <g font-size="11">
    <text x="985" y="36"  fill="#003A70" font-weight="700">Title bar</text>
    <text x="985" y="50"  fill="#525A60">DPI Blue, 26 pt · subtitle 16 pt</text>

    <text x="985" y="76"  fill="#003A70" font-weight="700">NCDPI logo</text>
    <text x="985" y="90"  fill="#525A60">Top-left for attribution</text>

    <text x="985" y="156" fill="#003A70" font-weight="700">BAN row</text>
    <text x="985" y="170" fill="#525A60">Headline numbers at 30,000 ft.</text>
    <text x="985" y="184" fill="#525A60">3–5 max; show the comparison.</text>

    <text x="985" y="214" fill="#003A70" font-weight="700">Filter rail</text>
    <text x="985" y="228" fill="#525A60">2–3 most-used visible.</text>
    <text x="985" y="242" fill="#525A60">Hide the rest behind "More".</text>

    <text x="985" y="346" fill="#003A70" font-weight="700">Charts (Z-pattern)</text>
    <text x="985" y="360" fill="#525A60">Top-left = most important.</text>
    <text x="985" y="374" fill="#525A60">Drill down as you move</text>
    <text x="985" y="388" fill="#525A60">down and right.</text>

    <text x="985" y="451" fill="#842175" font-weight="700">Help text</text>
    <text x="985" y="465" fill="#525A60">Plum #842175 — same as</text>
    <text x="985" y="479" fill="#525A60">chart annotation.</text>

    <text x="985" y="616" fill="#003A70" font-weight="700">Footer chrome</text>
    <text x="985" y="630" fill="#525A60">Data updated · contact ·</text>
    <text x="985" y="644" fill="#525A60">glossary link · logo.</text>
  </g>
</svg>
